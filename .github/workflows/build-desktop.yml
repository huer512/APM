name: Build Desktop

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "apps/apm-desktop/**"
      - "src/daemon/**"
      - "src/utils/apm-home.ts"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  desktop-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: npm ci

      - name: Build daemon binary
        run: npm run build:bin

      - name: Prepare sidecar
        run: |
          mkdir -p apps/apm-desktop/src-tauri/bin
          cp dist/bin/apm-daemon-linux-x64 apps/apm-desktop/src-tauri/bin/apm-daemon-x86_64-unknown-linux-gnu || \
            cp dist/bin/apm-daemon-* apps/apm-desktop/src-tauri/bin/ || true

      - name: Build desktop frontend
        run: npm run desktop:vite

      - name: Build Tauri app
        run: npm run desktop:build

      - name: Upload desktop bundles
        uses: actions/upload-artifact@v7
        with:
          name: apm-desktop-linux-x64
          path: |
            apps/apm-desktop/src-tauri/target/release/bundle/deb/*.deb
            apps/apm-desktop/src-tauri/target/release/bundle/appimage/*.AppImage
            apps/apm-desktop/src-tauri/target/release/bundle/rpm/*.rpm
          if-no-files-found: error
          retention-days: 14
