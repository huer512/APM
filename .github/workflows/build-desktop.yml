name: Build Desktop

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "apps/apm-desktop/**"
      - "src/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/build-desktop.yml"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  desktop:
    name: build (${{ matrix.os }}, ${{ matrix.artifact }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            artifact: darwin-arm64
          - os: windows-latest
            artifact: win32-x64
          - os: ubuntu-latest
            artifact: linux-x64

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf rpm

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri installer
        run: npm run desktop:build

      - name: Upload desktop bundles
        uses: actions/upload-artifact@v7
        with:
          name: apm-desktop-${{ matrix.artifact }}
          path: |
            apps/apm-desktop/src-tauri/target/release/bundle/dmg/*.dmg
            apps/apm-desktop/src-tauri/target/release/bundle/nsis/*.exe
            apps/apm-desktop/src-tauri/target/release/bundle/deb/*.deb
            apps/apm-desktop/src-tauri/target/release/bundle/rpm/*.rpm
          if-no-files-found: error
          retention-days: 14
