name: Build Desktop

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "apps/apm-desktop/**"
      - "src/daemon/**"
      - "src/utils/apm-home.ts"

jobs:
  desktop-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: npm ci

      - name: Build daemon binary
        run: npm run build:bin

      - name: Prepare sidecar
        run: |
          mkdir -p apps/apm-desktop/src-tauri/bin
          cp dist/bin/apm-daemon-linux-x64 apps/apm-desktop/src-tauri/bin/apm-daemon-x86_64-unknown-linux-gnu || \
            cp dist/bin/apm-daemon-* apps/apm-desktop/src-tauri/bin/ || true

      - name: Build desktop frontend
        run: npm run desktop:vite

      - name: Build Tauri app
        run: npm run desktop:build
        continue-on-error: true
