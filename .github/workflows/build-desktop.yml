name: Build Desktop

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    tags:
      - "v*.*.*"
    paths:
      - "apps/apm-desktop/**"
      - "src/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/build-desktop.yml"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_RUNTIME_VERSION: "24.18.0"

permissions:
  contents: write

jobs:
  desktop:
    name: build (${{ matrix.os }}, ${{ matrix.artifact }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            artifact: darwin-arm64
          - os: windows-latest
            artifact: win32-x64
          - os: ubuntu-latest
            artifact: linux-x64

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf rpm

      - name: Install dependencies
        run: npm ci

      - name: Generate CI updater key
        if: "!startsWith(github.ref, 'refs/tags/v')"
        shell: bash
        run: |
          key_path="$RUNNER_TEMP/apm-ci-updater.key"
          npm run tauri signer generate --workspace=apm-desktop -- --ci -f -w "$key_path"
          {
            echo "TAURI_SIGNING_PRIVATE_KEY<<EOF"
            cat "$key_path"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Configure release updater key
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          RELEASE_UPDATER_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          RELEASE_UPDATER_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if [ -z "$RELEASE_UPDATER_KEY" ]; then
            echo "TAURI_SIGNING_PRIVATE_KEY is required for release updater artifacts." >&2
            exit 1
          fi
          {
            echo "TAURI_SIGNING_PRIVATE_KEY<<EOF"
            echo "$RELEASE_UPDATER_KEY"
            echo "EOF"
          } >> "$GITHUB_ENV"
          if [ -n "$RELEASE_UPDATER_KEY_PASSWORD" ]; then
            {
              echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD<<EOF"
              echo "$RELEASE_UPDATER_KEY_PASSWORD"
              echo "EOF"
            } >> "$GITHUB_ENV"
          fi

      - name: Build Tauri installer
        run: npm run desktop:build

      - name: Upload desktop bundles
        uses: actions/upload-artifact@v7
        with:
          name: apm-desktop-${{ matrix.artifact }}
          path: |
            apps/apm-desktop/src-tauri/target/release/bundle/dmg/*.dmg
            apps/apm-desktop/src-tauri/target/release/bundle/macos/*.app.tar.gz
            apps/apm-desktop/src-tauri/target/release/bundle/macos/*.app.tar.gz.sig
            apps/apm-desktop/src-tauri/target/release/bundle/nsis/*.exe
            apps/apm-desktop/src-tauri/target/release/bundle/nsis/*.exe.sig
            apps/apm-desktop/src-tauri/target/release/bundle/deb/*.deb
            apps/apm-desktop/src-tauri/target/release/bundle/rpm/*.rpm
            apps/apm-desktop/src-tauri/target/release/bundle/appimage/*.AppImage
            apps/apm-desktop/src-tauri/target/release/bundle/appimage/*.AppImage.sig
          if-no-files-found: error
          retention-days: 14

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: desktop
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v7
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate updater manifest
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          repo="${GITHUB_REPOSITORY}"
          base_url="https://github.com/${repo}/releases/download/${tag}"

          mac_bundle="$(find release-assets -name '*.app.tar.gz' | head -n 1)"
          mac_sig="$(find release-assets -name '*.app.tar.gz.sig' | head -n 1)"
          win_bundle="$(find release-assets -name '*.exe' | head -n 1)"
          win_sig="$(find release-assets -name '*.exe.sig' | head -n 1)"
          linux_bundle="$(find release-assets -name '*.AppImage' | head -n 1)"
          linux_sig="$(find release-assets -name '*.AppImage.sig' | head -n 1)"

          for file in "$mac_bundle" "$mac_sig" "$win_bundle" "$win_sig" "$linux_bundle" "$linux_sig"; do
            if [ ! -f "$file" ]; then
              echo "Missing updater artifact: $file" >&2
              exit 1
            fi
          done
          export BASE_URL="$base_url"
          export VERSION="$tag"
          export MAC_BUNDLE="$mac_bundle"
          export MAC_SIG="$mac_sig"
          export WIN_BUNDLE="$win_bundle"
          export WIN_SIG="$win_sig"
          export LINUX_BUNDLE="$linux_bundle"
          export LINUX_SIG="$linux_sig"

          node --input-type=module <<'EOF'
          import { basename } from 'node:path';
          import { readFileSync, writeFileSync } from 'node:fs';

          const baseUrl = process.env.BASE_URL;
          const version = process.env.VERSION;
          const manifest = {
            version,
            pub_date: new Date().toISOString(),
            platforms: {
              'darwin-aarch64': {
                signature: readFileSync(process.env.MAC_SIG, 'utf8').trim(),
                url: `${baseUrl}/${basename(process.env.MAC_BUNDLE)}`,
              },
              'windows-x86_64': {
                signature: readFileSync(process.env.WIN_SIG, 'utf8').trim(),
                url: `${baseUrl}/${basename(process.env.WIN_BUNDLE)}`,
              },
              'linux-x86_64': {
                signature: readFileSync(process.env.LINUX_SIG, 'utf8').trim(),
                url: `${baseUrl}/${basename(process.env.LINUX_BUNDLE)}`,
              },
            },
          };
          writeFileSync('release-assets/latest.json', `${JSON.stringify(manifest, null, 2)}\n`);
          EOF

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**
          generate_release_notes: true
